<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pijat Karotis - Yudi Firebase</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .status-idle { background: #f1f5f9; color: #64748b; }
        .status-press { background: #fee2e2; color: var(--danger); border: 2px solid var(--danger); }
        .status-rest { background: #dcfce7; color: var(--success); border: 2px solid var(--success); }

        .timer-val { font-size: 5.5rem; font-weight: 900; color: #1e293b; margin: 5px 0; }
        .repetition-val { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; }

        .progress-track {
            width: 100%;
            height: 16px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        #progressFill { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s linear; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-action:disabled { background: #cbd5e1; box-shadow: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 0.9rem; }
        
        .sync-info { font-size: 0.75rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div id="statusIndicator" class="status-badge status-idle">Firebase Ready</div>
        <div id="repIndicator" class="repetition-val">Gerakan: 0 / 10</div>
        <div class="timer-val" id="timeValue">0</div>
        
        <div class="progress-track">
            <div id="progressFill"></div>
        </div>
        
        <button id="mainButton" class="btn-action" onclick="startFullSession()">MULAI 1 SESI</button>
        
        <p style="margin-top: 20px; font-weight: 600;">
            Hari Ini: <span id="sessionCount">0</span> / 5 Sesi
        </p>
        <div class="sync-info" id="syncStatus">Data tersimpan otomatis di Firestore</div>
    </div>

    <div class="card" style="text-align: left;">
        <h3 style="margin:0 0 15px 0; font-size: 1.1rem;">Riwayat Sesi Terkini</h3>
        <table id="historyTable">
            <tbody id="historyBody">
                <tr><td style="text-align:center">Menghubungkan ke database...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Konfigurasi Anda
    const firebaseConfig = {
        apiKey: "AIzaSyBVBps98Qu3JriGOOtWdLIq9rCgkXcvO5g",
        authDomain: "pijat-karotis-yudi.firebaseapp.com",
        projectId: "pijat-karotis-yudi",
        storageBucket: "pijat-karotis-yudi.firebasestorage.app",
        messagingSenderId: "670015628269",
        appId: "1:670015628269:web:02280565fa0fa9426bbde4",
        measurementId: "G-24EWRFWX2S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    let wakeLock = null;
    const dateKey = new Date().toLocaleDateString('id-ID');

    // --- FUNGSI AUDIO ---
    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function playBeep(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        osc.start(); setTimeout(() => osc.stop(), duration);
    }

    // --- FUNGSI STAY AWAKE ---
    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    // --- FUNGSI FIRESTORE ---
    
    // Load data otomatis (Real-time)
    const q = query(collection(db, "sesi_pijat"), orderBy("timestamp", "desc"), limit(5));
    onSnapshot(q, (snapshot) => {
        const historyBody = document.getElementById('historyBody');
        let html = "";
        let countToday = 0;

        snapshot.forEach((doc) => {
            const data = doc.data();
            if(data.date === dateKey) countToday++;
            html += `<tr><td><b>Sesi Selesai</b><br><small>${data.date} | ${data.time}</small></td>
                     <td style="text-align:right; color:var(--primary)">${data.reps} Gerakan</td></tr>`;
        });

        document.getElementById('sessionCount').innerText = countToday;
        historyBody.innerHTML = html || '<tr><td style="text-align:center">Belum ada riwayat</td></tr>';
    });

    async function saveSession() {
        try {
            await addDoc(collection(db, "sesi_pijat"), {
                date: dateKey,
                time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
                reps: 10,
                timestamp: Date.now()
            });
            document.getElementById('syncStatus').innerText = "Data tersimpan di Cloud";
        } catch (e) {
            console.error("Gagal simpan: ", e);
        }
    }

    // --- LOGIKA TIMER ---
    async function runTimer(seconds, label, mode) {
        return new Promise(resolve => {
            let remain = seconds;
            const el = document.getElementById('timeValue');
            const fill = document.getElementById('progressFill');
            const badge = document.getElementById('statusIndicator');

            const interval = setInterval(() => {
                if (remain > 0) playTick();
                el.innerText = remain;
                fill.style.width = ((seconds - remain) / seconds * 100) + "%";
                badge.innerText = label;
                badge.className = `status-badge status-${mode}`;
                fill.style.backgroundColor = (mode === 'press') ? "var(--danger)" : "var(--success)";

                if (remain === 0) {
                    playBeep(mode === 'press' ? 1200 : 600, 800);
                    clearInterval(interval); 
                    resolve(); 
                }
                remain--;
            }, 1000);
        });
    }

    window.startFullSession = async function() {
        const btn = document.getElementById('mainButton');
        const repLabel = document.getElementById('repIndicator');
        
        if (audioCtx.state === 'suspended') audioCtx.resume();
        btn.disabled = true;
        await requestWakeLock();
        
        for (let i = 1; i <= 10; i++) {
            repLabel.innerText = `Gerakan: ${i} / 10`;
            await runTimer(10, "TEKAN", "press");
            await runTimer(30, "LEPAS", "rest");
        }

        if (wakeLock) wakeLock.release();
        await saveSession();
        
        repLabel.innerText = "Sesi Selesai!";
        document.getElementById('statusIndicator').innerText = "DONE";
        document.getElementById('statusIndicator').className = "status-badge status-idle";
        btn.disabled = false;
    }
</script>
</body>
</html>
