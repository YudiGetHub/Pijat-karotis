<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Pijat Karotis - Yudi Louder Sound</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .status-idle { background: #f1f5f9; color: #64748b; }
        .status-press { background: #fee2e2; color: var(--danger); border: 2px solid var(--danger); }
        .status-rest { background: #dcfce7; color: var(--success); border: 2px solid var(--success); }

        .timer-val { font-size: 5.5rem; font-weight: 900; color: #1e293b; margin: 5px 0; }
        .repetition-val { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; }

        .progress-track {
            width: 100%;
            height: 16px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        #progressFill { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s linear; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-action:disabled { background: #cbd5e1; box-shadow: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 0.9rem; }
        
        .sync-info { font-size: 0.75rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div id="statusIndicator" class="status-badge status-idle">Siap Sesi</div>
        <div id="repIndicator" class="repetition-val">Gerakan: 0 / 10</div>
        <div class="timer-val" id="timeValue">0</div>
        
        <div class="progress-track">
            <div id="progressFill"></div>
        </div>
        
        <button id="mainButton" class="btn-action" onclick="startFullSession()">MULAI 1 SESI</button>
        
        <p style="margin-top: 20px; font-weight: 600;">
            Hari Ini: <span id="sessionCount">0</span> / 5 Sesi
        </p>
        <div class="sync-info" id="syncStatus">Suara Detik Kencang Aktif</div>
    </div>

    <div class="card" style="text-align: left;">
        <h3 style="margin:0 0 15px 0; font-size: 1.1rem;">Riwayat Sesi (GitHub)</h3>
        <table id="historyTable">
            <tbody id="historyBody">
                <tr><td style="text-align:center">Memuat riwayat...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const GH_CONFIG = {
        token: "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",
        repo: "YudiGitHub/Pijat-karotis"
    };

    let totalSessionsToday = 0;
    let wakeLock = null;
    const dateKey = new Date().toLocaleDateString('id-ID');
    
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.log("WakeLock Gagal"); }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    // FUNGSI SUARA DETIK KENCANG (DISAMAKAN DENGAN BEEP)
    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); // Frekuensi tinggi agar nyaring
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); // Volume disamakan dengan Beep
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }

    // FUNGSI SUARA PENANDA (BEEP)
    function playBeep(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (duration/1000));
        
        osc.start();
        osc.stop(audioCtx.currentTime + (duration/1000));
    }

    async function githubApi(method, body = null) {
        const url = `https://api.github.com/repos/${GH_CONFIG.repo}/contents/data.json`;
        const headers = { "Authorization": `token ${GH_CONFIG.token}`, "Content-Type": "application/json" };
        try {
            if (method === 'GET') {
                const res = await fetch(url, { headers });
                return res.ok ? await res.json() : null;
            } else {
                const res = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(body) });
                return await res.json();
            }
        } catch (e) { return null; }
    }

    async function loadData() {
        const file = await githubApi('GET');
        if (file) {
            const content = JSON.parse(atob(file.content));
            totalSessionsToday = content.filter(i => i.date === dateKey).length;
            document.getElementById('sessionCount').innerText = totalSessionsToday;
            updateUIHistory(content);
        }
    }

    function updateUIHistory(data) {
        const body = document.getElementById('historyBody');
        body.innerHTML = data.slice(0, 5).map(i => `
            <tr>
                <td><b>Sesi Selesai</b><br><small>${i.date} | ${i.time}</small></td>
                <td style="text-align:right; color:var(--primary)">10 Gerakan</td>
            </tr>
        `).join('');
    }

    async function runTimer(seconds, label, mode) {
        return new Promise(resolve => {
            let remain = seconds;
            const el = document.getElementById('timeValue');
            const fill = document.getElementById('progressFill');
            const badge = document.getElementById('statusIndicator');

            const interval = setInterval(() => {
                if (remain > 0) playTick(); // Suara detik kencang
                
                el.innerText = remain;
                fill.style.width = ((seconds - remain) / seconds * 100) + "%";
                badge.innerText = label;
                badge.className = `status-badge status-${mode}`;
                fill.style.backgroundColor = (mode === 'press') ? "var(--danger)" : "var(--success)";

                if (remain === 0) {
                    playBeep(mode === 'press' ? 1200 : 600, 800);
                    clearInterval(interval); 
                    resolve(); 
                }
                remain--;
            }, 1000);
        });
    }

    async function startFullSession() {
        const btn = document.getElementById('mainButton');
        const syncLabel = document.getElementById('syncStatus');
        const repLabel = document.getElementById('repIndicator');
        
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        btn.disabled = true;
        await requestWakeLock();
        
        for (let i = 1; i <= 10; i++) {
            repLabel.innerText = `Gerakan: ${i} / 10`;
            await runTimer(10, "TEKAN", "press");
            await runTimer(30, "LEPAS", "rest");
        }

        releaseWakeLock();

        totalSessionsToday++;
        document.getElementById('sessionCount').innerText = totalSessionsToday;

        const entry = {
            date: dateKey,
            time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
            type: "Full Session",
            reps: 10
        };

        syncLabel.innerText = "Sinkronisasi ke GitHub...";
        const currentFile = await githubApi('GET');
        let sha = currentFile ? currentFile.sha : "";
        let history = currentFile ? JSON.parse(atob(currentFile.content)) : [];

        history.unshift(entry);
        await githubApi('PUT', {
            message: `Sesi ${totalSessionsToday} - ${dateKey}`,
            content: btoa(JSON.stringify(history, null, 2)),
            sha: sha
        });

        syncLabel.innerText = "Data Berhasil Disimpan";
        updateUIHistory(history);
        
        repLabel.innerText = "Sesi 10 Gerakan Selesai!";
        document.getElementById('statusIndicator').innerText = "DONE";
        document.getElementById('statusIndicator').className = "status-badge status-idle";
        btn.disabled = false;
    }

    loadData();
</script>
</body>
</html>
