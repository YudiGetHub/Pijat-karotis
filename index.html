<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pijat Karotis - Panduan Lengkap</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .selector-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .pos-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .pos-btn.active {
            border-color: var(--primary);
            background: #eff6ff;
            color: var(--primary);
        }

        .guide-box {
            background: #f1f5f9;
            border-radius: 18px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #cbd5e1;
            min-height: 100px;
        }

        .guide-box img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            display: block;
            background: white;
        }

        .instruction-text {
            text-align: left;
            padding: 15px;
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.4;
            background: #fff;
            border-top: 1px solid #e2e8f0;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }

        .status-idle { background: #f1f5f9; color: #64748b; }
        .status-press { background: #fee2e2; color: var(--danger); border: 2px solid var(--danger); }
        .status-rest { background: #dcfce7; color: var(--success); border: 2px solid var(--success); }

        .timer-val { font-size: 5rem; font-weight: 900; color: #1e293b; margin: 0; }
        .repetition-val { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; }

        .progress-track {
            width: 100%;
            height: 12px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #progressFill { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s linear; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .btn-action:disabled { background: #cbd5e1; box-shadow: none; opacity: 0.6; }

        .history-card { text-align: left; }
        input[type="date"] { border: 1px solid #cbd5e1; padding: 5px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        td { padding: 10px 5px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h4 style="margin: 0 0 10px 0;">PILIH SISI PIJAT</h4>
        <div class="selector-group">
            <button class="pos-btn" id="btnKiri" onclick="selectPos('Kiri')">SISI KIRI</button>
            <button class="pos-btn" id="btnKanan" onclick="selectPos('Kanan')">SISI KANAN</button>
        </div>

        <div class="guide-box" id="guideContainer">
            <div style="padding: 40px 20px; color: #94a3b8; font-size: 0.9rem;">
                Silakan pilih sisi leher untuk melihat panduan langkah medis
            </div>
        </div>

        <div id="statusIndicator" class="status-badge status-idle">SIAP</div>
        <div id="repIndicator" class="repetition-val">Gerakan: 0 / 10</div>
        <div class="timer-val" id="timeValue">0</div>
        
        <div class="progress-track"><div id="progressFill"></div></div>
        
        <button id="mainButton" class="btn-action" onclick="startFullSession()" disabled>MULAI SESI</button>
        
        <p style="margin-top: 15px; font-weight: 600; font-size: 0.85rem;" id="sessionStatusLabel">
            Hari ini: <span id="sessionCount">0</span> / 5 Sesi
        </p>
    </div>

    <div class="card history-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <b style="font-size: 0.9rem;">RIWAYAT</b>
            <input type="date" id="datePicker">
        </div>
        <table id="historyTable"><tbody id="historyBody"></tbody></table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVBps98Qu3JriGOOtWdLIq9rCgkXcvO5g",
        authDomain: "pijat-karotis-yudi.firebaseapp.com",
        projectId: "pijat-karotis-yudi",
        storageBucket: "pijat-karotis-yudi.firebasestorage.app",
        messagingSenderId: "670015628269",
        appId: "1:670015628269:web:02280565fa0fa9426bbde4",
        measurementId: "G-24EWRFWX2S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let selectedSide = null;
    let wakeLock = null;
    let unsubscribe = null;

    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking) synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'id-ID';
        utter.rate = 1.3;
        synth.speak(utter);
    }

    // --- FUNGSI UPDATE TAMPILAN PANDUAN ---
    window.selectPos = function(side) {
        selectedSide = side;
        document.getElementById('btnKiri').className = side === 'Kiri' ? 'pos-btn active' : 'pos-btn';
        document.getElementById('btnKanan').className = side === 'Kanan' ? 'pos-btn active' : 'pos-btn';
        
        const guideContainer = document.getElementById('guideContainer');
        const imgUrl = side === 'Kiri' 
            ? "https://i.ibb.co.com/FLwmx838/pijat-kiri.jpg" 
            : "https://i.ibb.co.com/7dWWbdnk/pijat-kanan.jpg";

        const opposite = side === 'Kiri' ? 'Kanan' : 'Kiri';

        guideContainer.innerHTML = `
            <img src="${imgUrl}" alt="Panduan ${side}">
            <div class="instruction-text">
                <b>Cara Pijat Sisi ${side.toUpperCase()}:</b><br>
                1. Berbaring rileks, tengokkan kepala sedikit ke <b>${opposite}</b>.<br>
                2. Tempelkan telunjuk & jari tengah di titik nadi leher ${side}.<br>
                3. Beri tekanan lembut dengan gerakan melingkar kecil.<br>
                4. Ikuti hitungan: <b>10 detik TEKAN, 30 detik LEPAS</b>.
            </div>
        `;
        
        document.getElementById('mainButton').disabled = false;
        document.getElementById('statusIndicator').innerText = "SIAP: " + side.toUpperCase();
        speak(`Posisi ${side} dipilih. Silakan baca panduan lalu klik mulai.`);
    };

    // --- FIREBASE LOGIC ---
    const datePicker = document.getElementById('datePicker');
    const todayISO = new Date().toISOString().split('T')[0];
    datePicker.value = todayISO;

    function loadData(selectedDate) {
        if (unsubscribe) unsubscribe();
        const [y, m, d] = selectedDate.split('-');
        const formattedDate = `${parseInt(d)}/${parseInt(m)}/${y}`;
        
        const q = query(collection(db, "sesi_pijat"), where("date", "==", formattedDate), orderBy("timestamp", "desc"));
        unsubscribe = onSnapshot(q, (snapshot) => {
            const body = document.getElementById('historyBody');
            let html = ""; let count = 0;
            snapshot.forEach((doc) => {
                count++; const data = doc.data();
                html += `<tr><td><b>${data.side || 'Sesi'}</b><br><small>${data.time}</small></td>
                         <td style="text-align:right; color:var(--primary)">${data.reps} Gerakan</td></tr>`;
            });
            document.getElementById('sessionCount').innerText = count;
            body.innerHTML = html || '<tr><td colspan="2" style="text-align:center">Tidak ada data</td></tr>';
        });
    }

    loadData(datePicker.value);
    datePicker.addEventListener('change', (e) => loadData(e.target.value));

    // --- TIMER ENGINE ---
    async function runTimer(seconds, label, mode) {
        return new Promise(resolve => {
            let remain = seconds;
            const el = document.getElementById('timeValue');
            const fill = document.getElementById('progressFill');
            const badge = document.getElementById('statusIndicator');
            speak(label);

            const interval = setInterval(() => {
                el.innerText = remain;
                fill.style.width = ((seconds - remain) / seconds * 100) + "%";
                badge.innerText = label;
                badge.className = `status-badge status-${mode}`;
                fill.style.backgroundColor = (mode === 'press' ? "var(--danger)" : "var(--success)");
                if (remain > 0) speak(remain.toString());
                if (remain === 0) { clearInterval(interval); resolve(); }
                remain--;
            }, 1000);
        });
    }

    window.startFullSession = async function() {
        const btn = document.getElementById('mainButton');
        btn.disabled = true;
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        
        const opposite = selectedSide === 'Kiri' ? 'Kanan' : 'Kiri';
        speak(`Sesi dimulai. Tengokkan kepala ke ${opposite}.`);
        
        for (let i = 1; i <= 10; i++) {
            document.getElementById('repIndicator').innerText = `Gerakan: ${i} / 10`;
            await runTimer(10, "Tekan", "press");
            await runTimer(30, "Lepas", "rest");
        }
        
        if (wakeLock) wakeLock.release();
        await addDoc(collection(db, "sesi_pijat"), {
            date: new Date().toLocaleDateString('id-ID'),
            time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
            reps: 10, side: selectedSide, timestamp: Date.now()
        });
        
        speak("Sesi selesai. Data berhasil disimpan.");
        document.getElementById('statusIndicator').innerText = "DONE";
        btn.disabled = false;
        loadData(todayISO);
    }
</script>
</body>
</html>
