<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pijat Karotis - Visual Guide</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        /* Selektor Posisi */
        .selector-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .pos-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            background: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pos-btn.active {
            border-color: var(--primary);
            background: #eff6ff;
            color: var(--primary);
        }

        /* Area Gambar */
        .guide-image-container {
            width: 100%;
            height: 180px;
            background: #f1f5f9;
            border-radius: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px dashed #cbd5e1;
        }

        .guide-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .status-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .status-idle { background: #f1f5f9; color: #64748b; }
        .status-press { background: #fee2e2; color: var(--danger); border: 2px solid var(--danger); }
        .status-rest { background: #dcfce7; color: var(--success); border: 2px solid var(--success); }

        .timer-val { font-size: 5.5rem; font-weight: 900; color: #1e293b; margin: 5px 0; }
        .repetition-val { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; }

        .progress-track {
            width: 100%;
            height: 16px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        #progressFill { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s linear; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-action:disabled { background: #cbd5e1; box-shadow: none; opacity: 0.7; }

        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 12px;
        }

        input[type="date"] {
            border: 1px solid #cbd5e1;
            padding: 8px;
            border-radius: 8px;
            font-family: inherit;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 0.9rem; }
        
        .sync-info { font-size: 0.75rem; color: #94a3b8; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin-top:0; font-size: 1rem;">Pilih Posisi Pijat:</h3>
        <div class="selector-group">
            <button class="pos-btn" id="btnKiri" onclick="selectPos('Kiri')">SEBELAH KIRI</button>
            <button class="pos-btn" id="btnKanan" onclick="selectPos('Kanan')">SEBELAH KANAN</button>
        </div>

        <div class="guide-image-container" id="guideBox">
            <span style="color:#94a3b8; font-size: 0.9rem;">Pilih posisi untuk melihat panduan</span>
        </div>

        <div id="statusIndicator" class="status-badge status-idle">Siap Pijat</div>
        <div id="repIndicator" class="repetition-val">Gerakan: 0 / 10</div>
        <div class="timer-val" id="timeValue">0</div>
        
        <div class="progress-track">
            <div id="progressFill"></div>
        </div>
        
        <button id="mainButton" class="btn-action" onclick="startFullSession()" disabled>MULAI 1 SESI</button>
        
        <p style="margin-top: 20px; font-weight: 600; font-size: 0.9rem;" id="sessionStatusLabel">
            Hari ini sudah selesai <span id="sessionCount">0</span> Sesi dari 5 Sesi
        </p>
    </div>

    <div class="card" style="text-align: left;">
        <div class="filter-section">
            <span style="font-weight: 700; font-size: 0.8rem;">Riwayat Sesi:</span>
            <input type="date" id="datePicker">
        </div>
        <table id="historyTable"><tbody id="historyBody"></tbody></table>
        <div class="sync-info">Data disinkronkan dengan Firebase Cloud</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVBps98Qu3JriGOOtWdLIq9rCgkXcvO5g",
        authDomain: "pijat-karotis-yudi.firebaseapp.com",
        projectId: "pijat-karotis-yudi",
        storageBucket: "pijat-karotis-yudi.firebasestorage.app",
        messagingSenderId: "670015628269",
        appId: "1:670015628269:web:02280565fa0fa9426bbde4",
        measurementId: "G-24EWRFWX2S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let selectedSide = null;
    let wakeLock = null;
    let unsubscribe = null;

    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking) synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'id-ID';
        utter.rate = 1.2;
        synth.speak(utter);
    }

    // --- LOGIKA PEMILIHAN POSISI ---
    window.selectPos = function(side) {
        selectedSide = side;
        document.getElementById('btnKiri').className = side === 'Kiri' ? 'pos-btn active' : 'pos-btn';
        document.getElementById('btnKanan').className = side === 'Kanan' ? 'pos-btn active' : 'pos-btn';
        
        const guideBox = document.getElementById('guideBox');
        const startBtn = document.getElementById('mainButton');
        
        // Link gambar contoh (Ganti URL ini dengan link gambar Anda jika ada)
        const imgUrl = side === 'Kiri' 
            ? 'https://img.freepik.com/free-vector/human-internal-organ-with-carotid-artery_1308-111100.jpg' 
            : 'https://img.freepik.com/free-vector/human-internal-organ-with-carotid-artery_1308-111100.jpg';

        guideBox.innerHTML = `<img src="${imgUrl}" alt="Panduan ${side}"><br><small style="position:absolute; bottom:5px; background:rgba(255,255,255,0.8); padding:2px 10px; border-radius:10px;">Tekan area ${side}</small>`;
        guideBox.style.position = "relative";
        
        startBtn.disabled = false;
        speak(`Posisi ${side} dipilih. Silakan mulai sesi.`);
    };

    // --- FIREBASE & RIWAYAT ---
    const datePicker = document.getElementById('datePicker');
    const todayISO = new Date().toISOString().split('T')[0];
    datePicker.value = todayISO;

    function formatToIdDate(dateString) {
        const [year, month, day] = dateString.split('-');
        return `${parseInt(day)}/${parseInt(month)}/${year}`;
    }

    function loadData(selectedDate) {
        if (unsubscribe) unsubscribe();
        const formattedDate = formatToIdDate(selectedDate);
        const labelEl = document.getElementById('sessionStatusLabel');
        labelEl.innerHTML = selectedDate === todayISO 
            ? `Hari ini sudah selesai <span id="sessionCount">0</span> Sesi dari 5 Sesi`
            : `Tanggal ${formattedDate} selesai <span id="sessionCount">0</span> Sesi`;

        const q = query(collection(db, "sesi_pijat"), where("date", "==", formattedDate), orderBy("timestamp", "desc"));
        unsubscribe = onSnapshot(q, (snapshot) => {
            const body = document.getElementById('historyBody');
            let html = ""; let count = 0;
            snapshot.forEach((doc) => {
                count++; const data = doc.data();
                html += `<tr><td><b>${data.side || 'Sesi'} Selesai</b><br><small>${data.date} | ${data.time}</small></td>
                         <td style="text-align:right; color:var(--primary)">${data.reps} Gerakan</td></tr>`;
            });
            document.getElementById('sessionCount').innerText = count;
            body.innerHTML = html || '<tr><td style="text-align:center">Belum ada data</td></tr>';
        });
    }

    loadData(datePicker.value);
    datePicker.addEventListener('change', (e) => loadData(e.target.value));

    // --- RUN TIMER & SESSION ---
    async function runTimer(seconds, label, mode) {
        return new Promise(resolve => {
            let remain = seconds;
            const el = document.getElementById('timeValue');
            const fill = document.getElementById('progressFill');
            const badge = document.getElementById('statusIndicator');
            speak(`${label} posisi ${selectedSide}`);

            const interval = setInterval(() => {
                el.innerText = remain;
                fill.style.width = ((seconds - remain) / seconds * 100) + "%";
                badge.innerText = label;
                badge.className = `status-badge status-${mode}`;
                fill.style.backgroundColor = (mode === 'press' ? "var(--danger)" : "var(--success)");
                if (remain > 0) speak(remain.toString());
                if (remain === 0) { clearInterval(interval); resolve(); }
                remain--;
            }, 1000);
        });
    }

    window.startFullSession = async function() {
        const btn = document.getElementById('mainButton');
        btn.disabled = true;
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        
        speak(`Sesi dimulai pada posisi ${selectedSide}. Persiapkan diri.`);
        
        for (let i = 1; i <= 10; i++) {
            document.getElementById('repIndicator').innerText = `Gerakan: ${i} / 10`;
            await runTimer(10, "Tekan", "press");
            await runTimer(30, "Lepas", "rest");
        }
        
        if (wakeLock) wakeLock.release();
        await addDoc(collection(db, "sesi_pijat"), {
            date: new Date().toLocaleDateString('id-ID'),
            time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
            reps: 10, side: selectedSide, timestamp: Date.now()
        });
        
        speak("Sesi selesai. Data posisi " + selectedSide + " berhasil disimpan.");
        document.getElementById('statusIndicator').innerText = "DONE";
        btn.disabled = false;
        loadData(todayISO);
    }
</script>
</body>
</html>
